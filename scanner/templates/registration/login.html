{% extends 'scanner/base.html' %}
{% block title %}Login — TrackGuard{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
  <h1 style="text-align:center; margin-bottom: 2rem;">Login</h1>
  
  <div class="card">
    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username">
      </div>
      
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" autocomplete="current-password" required id="id_password">
      </div>
      
      {% if form.errors %}
      <div style="color: var(--warn); font-size: 0.8rem; margin-bottom: 1rem;">
        Your username and password didn't match. Please try again.
      </div>
      {% endif %}
      
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">Log In</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</div>
{% endblock %}
